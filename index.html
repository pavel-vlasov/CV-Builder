// Streams the Messages API response via SSE and calls onDelta(text) for
// every text chunk as it arrives, then resolves with the parsed CV JSON
// once the stream ends. `onDelta` lets the status modal show live
// progress instead of a single opaque wait for the whole response.
function streamClaudeApi(apiKey, contentBlock, onDelta) {
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-5',
      max_tokens: 8000,
      stream: true,
      messages: [{ role: 'user', content: [contentBlock, { type: 'text', text: AI_GENERATE_PROMPT }] }],
    }),
  }).then(function (res) {
    if (!res.ok) {
      return res.json().catch(function () { return null; }).then(function (body) {
        var msg = (body && body.error && body.error.message) || ('HTTP ' + res.status);
        throw new Error(msg);
      });
    }
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var accumulated = '';

    function handleEvent(block) {
      var lines = block.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.slice(0, 6) !== 'data: ') continue;
        var evt;
        try { evt = JSON.parse(line.slice(6)); } catch (e) { continue; }
        if (evt.type === 'content_block_delta' && evt.delta && evt.delta.type === 'text_delta') {
          accumulated += evt.delta.text;
          if (onDelta) onDelta(evt.delta.text);
        } else if (evt.type === 'error') {
          throw new Error((evt.error && evt.error.message) || 'Stream error.');
        }
      }
    }

    function pump() {
      return reader.read().then(function (result) {
        if (result.done) return;
        buffer += decoder.decode(result.value, { stream: true });
        var parts = buffer.split('\n\n');
        buffer = parts.pop();
        parts.forEach(handleEvent);
        return pump();
      });
    }

    return pump().then(function () { return accumulated; });
  }).then(function (raw) {
    raw = raw.trim();
    var fenceMatch = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (fenceMatch) raw = fenceMatch[1].trim();
    try {
      return JSON.parse(raw);
    } catch (e) {
      throw new Error('Claude did not return valid JSON.');
    }
  });
}

// Second modal, opened on top of the AI Generate modal once the request
// actually starts. Shows live streamed text; OK stays disabled (and
// Escape/outside-click do nothing) until the stream finishes, then OK
// closes both this modal and the AI Generate modal underneath.
function openStreamStatusModal() {
  var streamArea = h('pre', { class: 'ai-stream-area' }, []);
  var statusLine = h('div', { class: 'field' }, ['Generating…']);
  var body = h('div', { class: 'modal-form' }, [streamArea, statusLine]);

  var modal = openModal({ title: 'Generating CV data…', bodyEl: body });
  var overlay = document.querySelector('.modal-overlay:last-child');
  var okBtn = overlay.querySelector('.modal-footer .btn-primary');
  var busy = true;

  okBtn.disabled = true;
  okBtn.textContent = 'Generating…';

  // Capture-phase guards on the same nodes openModal's own bubble-phase
  // close handlers use — stopImmediatePropagation() during capture skips
  // those handlers entirely for as long as busy stays true.
  function guardKeydown(ev) { if (busy && ev.key === 'Escape') ev.stopImmediatePropagation(); }
  function guardMousedown(ev) { if (busy) ev.stopImmediatePropagation(); }
  document.addEventListener('keydown', guardKeydown, true);
  overlay.addEventListener('mousedown', guardMousedown, true);

  function appendText(text) {
    streamArea.textContent += text;
    streamArea.scrollTop = streamArea.scrollHeight;
  }

  function finish(success, msg) {
    busy = false;
    document.removeEventListener('keydown', guardKeydown, true);
    statusLine.textContent = msg;
    statusLine.className = 'field' + (success ? '' : ' err');
    okBtn.disabled = false;
    okBtn.textContent = 'OK';
  }

  return { appendText: appendText, finish: finish, okBtn: okBtn, close: modal.close };
}

function openAiGenerateModal() {
  var fileInput = h('input', { type: 'file', class: 'input', accept: '.pdf,.txt,.docx,image/*' });
  fileInput.style.display = 'none';
  var keyInput = h('input', { class: 'input', type: 'password', placeholder: 'sk-ant-...', value: getStoredApiKey() });
  keyInput.oninput = function () { storeApiKey(keyInput.value.trim()); };

  var dropzoneText = h('div', {}, ['Drag & drop a file here, or click to browse']);
  var dropzone = h('div', { class: 'ai-dropzone' }, [dropzoneText, fileInput]);

  function showChosenFile() {
    var file = fileInput.files && fileInput.files[0];
    dropzoneText.textContent = file ? ('Selected: ' + file.name) : 'Drag & drop a file here, or click to browse';
  }

  dropzone.onclick = function () { fileInput.click(); };
  fileInput.onchange = showChosenFile;
  dropzone.ondragover = function (ev) { ev.preventDefault(); dropzone.classList.add('drag-active'); };
  dropzone.ondragenter = function (ev) { ev.preventDefault(); dropzone.classList.add('drag-active'); };
  dropzone.ondragleave = function () { dropzone.classList.remove('drag-active'); };
  dropzone.ondrop = function (ev) {
    ev.preventDefault();
    dropzone.classList.remove('drag-active');
    var files = ev.dataTransfer && ev.dataTransfer.files;
    if (files && files.length) fileInput.files = files;
    showChosenFile();
  };

  var confirmEl = h('div', { class: 'field hidden' }, []);
  var statusEl = h('div', { class: 'field hidden' }, []);

  var body = h('div', { class: 'modal-form' }, [
    h('div', { class: 'field' }, [h('label', {}, ['CV document (PDF, TXT, DOCX, or image)']), dropzone]),
    h('div', { class: 'field' }, [
      h('label', {}, ['Anthropic API key']),
      keyInput,
      h('div', { class: 'empty-hint' }, ['Stored locally in this browser; sent directly to Anthropic when you click Generate.']),
    ]),
    confirmEl,
    statusEl,
  ]);

  function setStatus(msg, isErr) {
    statusEl.textContent = msg || '';
    statusEl.className = 'field' + (isErr ? ' err' : '') + (msg ? '' : ' hidden');
  }

  function clearConfirm() {
    confirmEl.innerHTML = '';
    confirmEl.className = 'field hidden';
  }

  var modal = openModal({
    title: 'AI Generate CV',
    bodyEl: body,
    saveLabel: 'Generate',
    onSave: function (close) { startGeneration(close, false); },
  });

  var generateBtn = document.querySelector('.modal-overlay:last-child .modal-footer .btn-primary');

  function setBusy(busy) {
    fileInput.disabled = busy;
    keyInput.disabled = busy;
    if (generateBtn) {
      generateBtn.disabled = busy;
      generateBtn.textContent = busy ? 'Generating…' : 'Generate';
    }
  }

  function startGeneration(close, skipGuard) {
    var file = fileInput.files && fileInput.files[0];
    var apiKey = keyInput.value.trim();
    setStatus('');
    if (!file) { setStatus('Choose a file first.', true); return; }
    if (!apiKey) { setStatus('Enter your Anthropic API key.', true); return; }

    if (!skipGuard && cvDataHasContent()) {
      confirmEl.className = 'field';
      confirmEl.innerHTML = '';
      var saveFirstBtn = h('button', { class: 'btn btn-sm', type: 'button' }, ['Save current, then continue']);
      var overwriteBtn = h('button', { class: 'btn btn-sm', type: 'button' }, ['Overwrite without saving']);
      var cancelGuardBtn = h('button', { class: 'btn btn-sm', type: 'button' }, ['Cancel']);
      saveFirstBtn.onclick = function () { clearConfirm(); saveFile(); startGeneration(close, true); };
      overwriteBtn.onclick = function () { clearConfirm(); startGeneration(close, true); };
      cancelGuardBtn.onclick = clearConfirm;
      confirmEl.appendChild(h('div', {}, ['The form already has data. Save it before overwriting?']));
      confirmEl.appendChild(saveFirstBtn);
      confirmEl.appendChild(overwriteBtn);
      confirmEl.appendChild(cancelGuardBtn);
      return;
    }

    clearConfirm();
    setBusy(true);

    var statusModal = openStreamStatusModal();
    statusModal.okBtn.onclick = function () { statusModal.close(); close(); };

    fileToContentBlock(file).then(function (block) {
      return streamClaudeApi(apiKey, block, statusModal.appendText);
    }).then(function (parsed) {
      applyOpenedJson(parsed, null);
      setBusy(false);
      statusModal.finish(true, 'Completed.');
      showStatus('CV data generated from document.');
    }).catch(function (err) {
      setBusy(false);
      statusModal.finish(false, 'Failed: ' + (err && err.message ? err.message : 'unknown error'));
    });
  }
}

function importJsonFile(file) {
  var reader = new FileReader();
  reader.onload = function () {
    var parsed;
    try {
      parsed = JSON.parse(String(reader.result));
    } catch (e) {
      showStatus('Import failed: invalid JSON file.', true);
      return;
    }
    try {
      applyOpenedJson(parsed, null);
      showStatus('CV data imported successfully.');
    } catch (e) {
      showStatus('Import failed: ' + (e && e.message ? e.message : 'unknown error'), true);
    }
  };
  reader.onerror = function () {
    showStatus('Import failed: could not read file.', true);
  };
  reader.readAsText(file);
}

// Open: always tries the native picker first when available. Feature-
// detected AND wrapped in try/catch (see saveFileAs for why). AbortError
// (user cancelled) is a silent no-op; any other picker failure falls back
// to clicking the hidden <input type=file>. Once a handle is in hand,
// read/parse/merge failures are reported locally and do NOT re-trigger the
// fallback (re-prompting with a different picker after the user already
// chose a file would be confusing).
function openFile() {
  if (typeof window.showOpenFilePicker !== 'function') { byId('importFileInput').click(); return; }

  var options = {
    types: [{ description: 'CV JSON', accept: { 'application/json': ['.json'] } }]
  };

  // Best-effort startIn lookup — see saveFileAs for why this is isolated
  // (own .then/.catch) from the picker-availability try/catch below.
  getLastDirHandle().then(function (lastDirHandle) {
    if (lastDirHandle) options.startIn = lastDirHandle;
  }).catch(function () {}).then(function () {
    var pickerPromise;
    try {
      pickerPromise = window.showOpenFilePicker(options);
    } catch (err) {
      if (err && err.name === 'AbortError') return;
      byId('importFileInput').click();
      return;
    }

    pickerPromise.then(function (handles) {
      var handle = handles[0];
      storeLastDirHandle(handle);
      handle.getFile().then(function (file) {
        return file.text();
      }).then(function (text) {
        var parsed;
        try {
          parsed = JSON.parse(text);
        } catch (e) {
          showStatus('Open failed: invalid JSON file.', true);
          return;
        }
        try {
          applyOpenedJson(parsed, handle);
          showStatus('CV data opened successfully.');
        } catch (e) {
          showStatus('Open failed: ' + (e && e.message ? e.message : 'unknown error'), true);
        }
      }).catch(function (err) {
        showStatus('Open failed: ' + (err && err.message ? err.message : 'unknown error'), true);
      });
    }).catch(function (err) {
      if (err && err.name === 'AbortError') return;
      byId('importFileInput').click();
    });
  });
}

  buildExperienceTab();
  updateNavCounts();
  setActiveTab(state.activeTab);
  setActiveNavItem(document.querySelector('.nav-item[data-view="' + state.activeTab + '"]'));

  byId('templateSelect').onchange = function () {
    state.activeTemplateId = byId('templateSelect').value;
    renderAll();
    refreshPreviewIfActive();
    schedulePersist();
  };

  byId('btnThemeToggle').onclick = cycleTheme;

  byId('btnOpen').onclick = openFile;
  byId('btnAiGenerate').onclick = openAiGenerateModal;
  byId('importFileInput').onchange = function (ev) {
    var file = ev.target.files && ev.target.files[0];
    if (file) importJsonFile(file);
    ev.target.value = '';
  };

  var NAV_MODAL_FNS = {
    skills: openSkillsModal,
    metrics: openMetricsModal,
  };

  document.querySelectorAll('.nav-item').forEach(function (item) {
    item.onclick = function () {
      setActiveNavItem(item);
      setActiveTab(item.dataset.view);
      var listKey = item.dataset.listKey;
      var modalFn = item.dataset.modalFn;
      if (listKey) {
        var opts = LIST_DEFS.filter(function (d) { return d.listKey === listKey; })[0];
        if (opts) openListModal(opts);
      } else if (modalFn && NAV_MODAL_FNS[modalFn]) {
        NAV_MODAL_FNS[modalFn]();
      } else if (item.dataset.target) {
        scrollToCard(item.dataset.target);
      }
      closeSidebarDrawer();
    };
  });

  document.querySelectorAll('.step').forEach(function (step) {
    step.onclick = function () {
      setActiveTab(step.dataset.view);
      setActiveNavItem(document.querySelector('.nav-item[data-view="' + step.dataset.view + '"]'));
    };
  });

  byId('btnSidebarToggle').onclick = function () {
    var open = byId('sidebar').classList.toggle('open');
    byId('sidebarScrim').classList.toggle('visible', open);
    byId('btnSidebarToggle').setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  byId('sidebarScrim').onclick = closeSidebarDrawer;
  document.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape') closeSidebarDrawer();
  });

  byId('zoomSelect').onchange = applyZoom;

  var previewFrame = byId('previewFrame');
  previewFrame.addEventListener('load', function () {
    previewLoaded = true;
    measurePreviewHeight();
    var doc = previewFrame.contentDocument;
    if (doc && doc.documentElement && window.ResizeObserver) {
      // Fonts and the hero/footer background images finish loading after
      // this `load` event and can shift the document height — keep
      // watching so the frame doesn't stay clipped at the pre-image height.
      previewResizeObserver = new ResizeObserver(function () { measurePreviewHeight(); });
      previewResizeObserver.observe(doc.documentElement);
    } else {
      setTimeout(measurePreviewHeight, 300);
      setTimeout(measurePreviewHeight, 1000);
    }
  });

  byId('btnSaveHtml').onclick = exportHtml;

  var saveMenu = byId('saveMenu');
  var saveMenuToggle = byId('btnSaveMenuToggle');
  saveMenuToggle.onclick = function (ev) {
    ev.stopPropagation();
    var willOpen = saveMenu.hasAttribute('hidden');
    if (willOpen) saveMenu.removeAttribute('hidden'); else saveMenu.setAttribute('hidden', '');
    saveMenuToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
  };
  byId('btnSavePdf').onclick = function () {
    saveMenu.setAttribute('hidden', '');
    saveMenuToggle.setAttribute('aria-expanded', 'false');
    exportPdf();
  };
  document.addEventListener('click', function (ev) {
    if (!saveMenu.hasAttribute('hidden') && !byId('saveSplitBtn').contains(ev.target)) {
      saveMenu.setAttribute('hidden', '');
      saveMenuToggle.setAttribute('aria-expanded', 'false');
    }
  });
  document.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape' && !saveMenu.hasAttribute('hidden')) {
      saveMenu.setAttribute('hidden', '');
      saveMenuToggle.setAttribute('aria-expanded', 'false');
    }
  });

  byId('btnSave').onclick = saveFile;

  var saveAsMenu = byId('saveAsMenu');
  var saveAsMenuToggle = byId('btnSaveAsToggle');
  saveAsMenuToggle.onclick = function (ev) {
    ev.stopPropagation();
    var willOpen = saveAsMenu.hasAttribute('hidden');
    if (willOpen) saveAsMenu.removeAttribute('hidden'); else saveAsMenu.setAttribute('hidden', '');
    saveAsMenuToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
  };
  byId('btnSaveAs').onclick = function () {
    saveAsMenu.setAttribute('hidden', '');
    saveAsMenuToggle.setAttribute('aria-expanded', 'false');
    saveFileAs();
  };
  document.addEventListener('click', function (ev) {
    if (!saveAsMenu.hasAttribute('hidden') && !byId('jsonSaveSplitBtn').contains(ev.target)) {
      saveAsMenu.setAttribute('hidden', '');
      saveAsMenuToggle.setAttribute('aria-expanded', 'false');
    }
  });
  document.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape' && !saveAsMenu.hasAttribute('hidden')) {
      saveAsMenu.setAttribute('hidden', '');
      saveAsMenuToggle.setAttribute('aria-expanded', 'false');
    }
  });
}

// Warn before leaving with unsaved changes (tab close, refresh, in-app nav
// away). Most browsers ignore the custom message text and show their own
// generic confirmation prompt instead.
window.addEventListener('beforeunload', function (ev) {
  if (state.dirty) {
    ev.preventDefault();
    ev.returnValue = '';
  }
});

/* Kick off resource loading, then boot. This script tag sits at the end of
 * <body>, so the DOM above is already parsed by the time this runs — no
 * need to wait for DOMContentLoaded. */
Promise.all([
  loadResourceSet('resources/template/manifest.js', function () { return window.CVB && window.CVB.templateManifest; }, 'resources/template/'),
]).then(function (results) {
  TEMPLATES = (window.CVB && window.CVB.templates) || {};
  var failed = results[0].failed;
  init();
  if (failed.length) {
    console.warn('[cvbuilder] resource load failures:', failed);
    showStatus('Some resources failed to load — see console.', true);
  }
});
</script>

<script>
/* PWA: SW only registers on http(s)/localhost, never file:// — the .catch
 * keeps the file:// double-click mode silent and working exactly as before. */
var deferredInstallPrompt = null;

function showUpdateBanner(onUpdate) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;left:14px;bottom:14px;z-index:9999;display:flex;align-items:center;gap:10px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-md);padding:10px 12px;max-width:300px;font-size:13px;color:var(--text2);';
  el.innerHTML = '<span style="flex:1;">Доступна новая версия</span>';
  var btn = document.createElement('button');
  btn.textContent = 'Обновить';
  btn.className = 'btn-tonal';
  btn.style.cssText = 'border:0;font-weight:600;font-size:12px;padding:6px 10px;border-radius:7px;cursor:pointer;';
  btn.addEventListener('click', function () {
    btn.disabled = true;
    onUpdate();
  });
  el.appendChild(btn);
  document.body.appendChild(el);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(function (reg) {
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(function () { nw.postMessage('SKIP_WAITING'); });
          }
        });
      });
      setInterval(function () { reg.update(); }, 60 * 60 * 1000);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') reg.update();
      });
    }).catch(function () {});

    var refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}

window.addEventListener('beforeinstallprompt', function (ev) {
  ev.preventDefault();
  deferredInstallPrompt = ev;
  byId('btnInstallApp').classList.remove('hidden');
});

window.addEventListener('appinstalled', function () {
  deferredInstallPrompt = null;
  byId('btnInstallApp').classList.add('hidden');
});

byId('btnInstallApp').onclick = function () {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(function () { deferredInstallPrompt = null; });
};
</script>
</body>
